name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Se activa con tags tipo v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Permite correrlo manualmente desde GitHub

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Windows (NSIS installer + portable)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Para firmar el ejecutable (opcional pero recomendado):
          # CSC_LINK: ${{ secrets.WIN_CERT_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: npm run build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.yml
            dist/latest.yml
          retention-days: 5

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/latest.yml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
