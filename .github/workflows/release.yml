name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Se activa con tags tipo v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Permite correrlo manualmente desde GitHub

permissions:
  contents: write     # Necesario para que el token pueda crear Releases

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Build Windows y publicar Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win
